name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run unit tests
        run: dotnet test test/BudgetFriend.API.UnitTests --no-build --no-restore -c Release --logger "trx" --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test test/BudgetFriend.API.IntegrationTests --no-build --no-restore -c Release --logger "trx" --collect:"XPlat Code Coverage"
