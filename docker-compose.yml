services:
  postgres:
    image: postgres:17
    container_name: budgetfriend.api-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: budgetfriend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./BudgetFriend.Api

    container_name: budgetfriend.api

    depends_on:
      - postgres

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__Database: Host=postgres;Port=5432;Database=budgetfriend_db;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379

    ports:
      - "8080:8080"

  redis:
    image: redis:8-alpine
    container_name: budgetfriend.redis
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data:
